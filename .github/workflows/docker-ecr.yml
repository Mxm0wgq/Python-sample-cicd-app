name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 461768631889.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t python-sample-app .

    - name: Tag Docker image
      run: |
        docker tag python-sample-app:latest 461768631889.dkr.ecr.ap-south-1.amazonaws.com/python-sample-app:latest

    - name: Push Docker image
      run: |
        docker push 461768631889.dkr.ecr.ap-south-1.amazonaws.com/python-sample-app:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

  steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull 461768631889.dkr.ecr.ap-south-1.amazonaws.com/python-sample-app:latest
          docker run -d -p 5000:5000 461768631889.dkr.ecr.ap-south-1.amazonaws.com/python-sample-app:latest    
